<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="页面不存在 - Automy 奥托迈" />
  <title>404 · 页面未找到 · Automy 奥托迈</title>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('automy-theme');
        if (saved === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/prototype.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230EA5A8'/%3E%3Ctext x='50' y='72' font-size='62' font-weight='900' text-anchor='middle' fill='white' font-family='sans-serif'%3EA%3C/text%3E%3C/svg%3E" />
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }
    .not-found__bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .not-found__orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
    }
    .not-found__orb--1 {
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, var(--color-primary), transparent 70%);
      top: -120px;
      right: -80px;
    }
    .not-found__orb--2 {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, var(--color-secondary), transparent 70%);
      bottom: -100px;
      left: -80px;
      opacity: 0.2;
    }
    .not-found__grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--color-border-light) 1px, transparent 1px),
        linear-gradient(to bottom, var(--color-border-light) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      opacity: 0.4;
    }
    .not-found__inner {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
    }
    .not-found__code {
      font-size: 160px;
      font-weight: 800;
      line-height: 1;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      opacity: 0.9;
    }
    .not-found__title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .not-found__desc {
      font-size: 15px;
      color: var(--color-text-secondary);
      line-height: var(--line-relaxed);
      margin-bottom: 32px;
    }
    .not-found__actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .not-found__suggest {
      margin-top: 48px;
      padding: 24px;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      text-align: left;
    }
    .not-found__suggest-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-tertiary);
      margin-bottom: 12px;
    }
    .not-found__suggest-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .not-found__suggest-list a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--color-bg-subtle);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--color-text);
      transition: all var(--transition-fast);
    }
    .not-found__suggest-list a:hover {
      background: var(--color-primary-light);
      color: var(--color-primary-active);
    }
    .not-found__topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
    }
    @media (max-width: 768px) {
      .not-found__code { font-size: 100px; }
      .not-found__title { font-size: 22px; }
      .not-found__suggest-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- 简化顶栏 -->
  <header class="topbar not-found__topbar">
    <div class="topbar__inner">
      <a href="./" class="logo" aria-label="Automy 首页">
        <span class="logo__mark">A</span>
        <span class="logo__text">Automy</span>
      </a>
      <div class="topbar__actions" style="margin-left:auto;">
        <a href="./" class="btn btn-ghost btn-sm">返回首页</a>
      </div>
    </div>
  </header>

  <main class="not-found">
    <div class="not-found__bg">
      <div class="not-found__orb not-found__orb--1"></div>
      <div class="not-found__orb not-found__orb--2"></div>
      <div class="not-found__grid"></div>
    </div>
    <div class="not-found__inner">
      <div class="not-found__code">404</div>
      <h1 class="not-found__title">页面走丢了</h1>
      <p class="not-found__desc">
        您访问的页面可能已被移除、重命名,或从未存在。<br>
        请检查 URL 是否正确,或返回首页继续浏览。
      </p>
      <div class="not-found__actions">
        <a href="./" class="btn btn-primary btn-lg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          返回首页
        </a>
        <button class="btn btn-ghost btn-lg" onclick="window.history.back()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          返回上一页
        </button>
      </div>

      <div class="not-found__suggest">
        <div class="not-found__suggest-title">热门页面</div>
        <ul class="not-found__suggest-list">
          <li><a href="./#/docs/requirements/overview">📋 需求文档总览</a></li>
          <li><a href="./#/docs/architecture/overview">🏛 技术架构总览</a></li>
          <li><a href="./#/prototype/workspace">💼 工作台原型</a></li>
          <li><a href="./#/prototype/skill-market">⚡ 技能市场</a></li>
          <li><a href="./#/prototype/expert-market">🤖 专家市场</a></li>
          <li><a href="./#/roadmap">🚀 产品路线图</a></li>
          <li><a href="./#/glossary">📖 术语表</a></li>
          <li><a href="./shared/components.html">🎨 组件库</a></li>
        </ul>
      </div>
    </div>
  </main>

  <script type="module">
    // 主题切换支持
    import './assets/js/theme.js';
  </script>
</body>
</html>
